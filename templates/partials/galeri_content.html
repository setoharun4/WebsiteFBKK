<div class="form-section section">
    <h2 class="section-title">Upload Dokumentasi Kegiatan</h2>
    <form action="{{ url_for('galeri') }}" method="POST" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="judul">Judul Kegiatan</label>
                <input type="text" id="judul" name="judul" class="form-input" placeholder="Judul kegiatan" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="tahun">Tahun</label>
                <input type="number" id="tahun" name="tahun" class="form-input" value="2025" min="2000" max="2030" required>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label" for="deskripsi">Deskripsi</label>
                <textarea id="deskripsi" name="deskripsi" class="form-textarea" rows="2" placeholder="Tempat, tanggal, keterangan"></textarea>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label" for="fotos">Foto (bisa lebih dari satu)</label>
                <input type="file" id="fotos" name="fotos" class="form-file" accept=".png,.jpg,.jpeg" multiple required>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Upload Galeri</button>
        </div>
    </form>
</div>

<div class="filter-bar">
    <label for="filter-year">Filter Tahun:</label>
    <select id="filter-year" class="form-select" style="width:auto;min-width:140px;">
        <option value="all" {% if not selected_year %}selected{% endif %}>Semua Tahun</option>
        {% for tahun in tahun_list %}
        <option value="{{ tahun }}" {% if selected_year|string == tahun|string %}selected{% endif %}>{{ tahun }}</option>
        {% endfor %}
    </select>
</div>

{% if galeri_list %}
<div class="galeri-grid" id="galeri-grid">
    {% for galeri in galeri_list %}
    <article class="galeri-card galeri-card-clickable" data-year="{{ galeri.tahun }}" data-id="{{ galeri.id }}" data-judul="{{ galeri.judul }}">
        <img src="{{ url_for('static', filename=galeri.cover) if galeri.cover else '' }}" alt="{{ galeri.judul }}"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22180%22%3E%3Crect fill=%22%23e2e8f0%22 width=%22400%22 height=%22180%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2394a3b8%22%3E📷%3C/text%3E%3C/svg%3E'">
        <div class="galeri-card-body">
            <h3>{{ galeri.judul }}</h3>
            <p>Tahun {{ galeri.tahun }}</p>
            <form action="{{ url_for('hapus_galeri_kegiatan', galeri_id=galeri.id) }}" method="POST"
                  onsubmit="return confirm('Hapus seluruh album kegiatan ini?');" style="margin-top:0.5rem;">
                <button type="submit" class="btn btn-delete btn-sm">Hapus Album</button>
            </form>
        </div>
    </article>
    {% endfor %}
</div>
{% else %}
<div class="card empty-state">
    <p>Belum ada dokumentasi kegiatan. Gunakan form di atas untuk upload.</p>
</div>
{% endif %}

<div id="popup-overlay" class="popup-overlay">
    <div class="popup-content" id="popup-content">
        <button type="button" class="close-btn" id="popup-close" aria-label="Tutup">×</button>
        <h2 id="popup-title" class="popup-title"></h2>
        <div class="popup-images-scroll" id="popup-images"></div>
        <input type="hidden" id="popup-galeri-id">
        <form id="popup-upload-form" class="popup-upload-form" enctype="multipart/form-data">
            <div class="form-group">
                <label class="form-label" for="foto-tambahan">Tambah Foto ke Album Ini</label>
                <input type="file" id="foto-tambahan" name="foto_tambahan" class="form-file" accept=".png,.jpg,.jpeg" required>
            </div>
            <button type="submit" class="btn btn-primary btn-sm">Tambah Foto</button>
        </form>
    </div>
</div>
